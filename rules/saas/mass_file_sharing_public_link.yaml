rule_id: rule_mass_file_sharing_public_link
title: Mass File Sharing Public Link
description: Detects synthetic mass file sharing public link activity.
log_source: saas_audit_logs
detection_logic: scenario_type == 'mass_file_sharing_public_link' or source-specific
