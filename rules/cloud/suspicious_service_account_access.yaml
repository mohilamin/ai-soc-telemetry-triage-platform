rule_id: rule_suspicious_service_account_access
title: Suspicious Service Account Access
description: Detects synthetic suspicious service account access activity.
log_source: cloud_access_logs
detection_logic: scenario_type == 'suspicious_service_account_access' or source-specific
  threshold pattern
severity: high
tactic: Defense Evasion
technique: Service Account Abuse
false_positive_notes: Synthetic benign admin activity can resemble this pattern.
recommended_response: Rotate service account key and validate workload identity.
