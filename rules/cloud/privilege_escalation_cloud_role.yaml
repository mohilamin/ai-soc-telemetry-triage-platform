rule_id: rule_privilege_escalation_cloud_role
title: Privilege Escalation Cloud Role
description: Detects synthetic privilege escalation cloud role activity.
log_source: cloud_access_logs
detection_logic: scenario_type == 'privilege_escalation_cloud_role' or source-specific
  threshold pattern
severity: critical
tactic: Privilege Escalation
technique: Cloud Role Modification
false_positive_notes: Synthetic benign admin activity can resemble this pattern.
recommended_response: Revert role change and review cloud audit trail.
